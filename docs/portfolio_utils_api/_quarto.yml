project:
  type: default
  output-dir: .
  render:
    - assets_research_api.md
    - portfolio_elementary_metrics_api.md
    - portfolio_elementary_analysis_api.md
    - portfolio_optimization_api.md

format:
  html:
    toc: true
    toc-depth: 3
    number-sections: true
    embed-resources: true
    theme: none
    css: api-theme.css
    code-copy: true
    smooth-scroll: true
    anchor-sections: true
  pdf:
    pdf-engine: pdflatex
    toc: true
    number-sections: true
    colorlinks: true
    documentclass: article
    geometry:
      - left=1.4cm
      - right=6.2cm
      - top=1.6cm
      - bottom=1.8cm
    include-in-header:
      - pdf-header.tex
